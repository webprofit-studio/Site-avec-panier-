<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebProfit Store</title>

<style>
:root {
    --primary:#111;
    --accent:#27ae60;
    --promo:#ff3b30;
    --bg:#f4f4f7;
}

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
}

/* PROMO BAR */
.promo-bar {
    background:#111;
    color:white;
    text-align:center;
    padding:10px;
    font-size:12px;
}

/* HEADER */
header {
    background:white;
    padding:30px 20px;
    text-align:center;
}

/* SVG LOGO */
.logo svg {
    background:#111;
    border-radius:50%;
    padding:10px;
}

/* ATTENTION TEXT */
.alert {
    margin-top:10px;
    font-size:12px;
    color:#ff3b30;
    font-weight:bold;
    background:#fff3f3;
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    animation:pulse 1.5s infinite;
}

/* PRODUITS */
.container {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:15px;
}

.product {
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.price {
    color:#ff3b30;
    font-weight:bold;
}

/* BTN */
.btn {
    background:#111;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

/* CHECKOUT */
.checkout {
    background:white;
    margin:20px;
    padding:20px;
    border-radius:20px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

/* ANIMATION */
@keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="promo-bar">
🔥 PROMO : -10% AUJOURD'HUI 🔥
</div>

<header>
<img src="choco.jpeg" alt="choco" style="width: 100%; max-width: 300px; display: block; margin: 0 auto;">

<h1 style="color:#27ae60;">WebProfit Store</h1>

<p>Transforme tes visiteurs en clients 🚀</p>

<div class="alert">
⚠️ Offre limitée aujourd’hui
</div>


</header>

<!-- PRODUITS -->
<div class="container">

<div class="product">
<h3>Habit Élégant</h3>
<img src="boss.jpeg" alt="boss" style="width: 100%; max-width: 300px; display: block; margin: 0 auto;">

<p class="price">1 350 F</p>
<button class="btn" onclick="add('Habit',1350)">Ajouter</button>
</div>

<div class="product">
<h3>Pantalon Stylé</h3>
<img src="pantalon.jpeg" alt="pantalon" style="width: 100%; max-width: 300px; display: block; margin: 0 auto;">

<p class="price">3 600 F</p>
<button class="btn" onclick="add('Pantalon',3600)">Ajouter</button>
</div>

<div class="product">
<h3>Sneakers</h3>
<img src="paire.jpeg" alt="paire" style="width: 100%; max-width: 300px; display: block; margin: 0 auto;">

<p class="price">3 150 F</p>
<button class="btn" onclick="add('Sneakers',3150)">Ajouter</button>
</div>

<div class="product">
<h3>Chapeau</h3>
<img src="ch.jpeg" alt="ch" style="width: 100%; max-width: 300px; display: block; margin: 0 auto;">

<p class="price">900 F</p>
<button class="btn" onclick="add('Chapeau',900)">Ajouter</button>

</div>

</div>

<!-- PANIER -->
<div class="checkout">

<h2>🛒 Panier</h2>

<div id="cart"></div>

<p><b>Total : <span id="total">0</span> FCFA</b></p>

<input id="name" placeholder="Nom">
<input id="loc" placeholder="Lieu">

<button class="btn" onclick="send()">Commander</button>

</div>

<script>
let total=0;

function add(name,price){
let div=document.createElement("div");
div.innerText=name+" - "+price+"F";
document.getElementById("cart").appendChild(div);

total+=price;
document.getElementById("total").innerText=total;
}

function send(){
let name=document.getElementById("name").value;

if(name==""){alert("Remplis ton nom");return;}

let message="Commande:\nTotal:"+total+" FCFA";

window.open("https://wa.me/2250719949973?text="+encodeURIComponent(message));
}
</script>

</body>
</html>
