<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebProfit Store</title>

<style>
:root {
    --primary:#111;
    --accent:#27ae60;
    --promo:#ff3b30;
    --bg:#f4f4f7;
}

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
}

/* PROMO BAR */
.promo-bar {
    background:#111;
    color:white;
    text-align:center;
    padding:10px;
    font-size:12px;
}

/* HEADER */
header {
    background:white;
    padding:30px 20px;
    text-align:center;
}

/* IMAGE HEADER */
header img {
    width:100%;
    max-width:300px;
    border-radius:15px;
}

/* ALERT */
.alert {
    margin-top:10px;
    font-size:12px;
    color:#ff3b30;
    font-weight:bold;
    background:#fff3f3;
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    animation:pulse 1.5s infinite;
}

/* PRODUITS */
.container {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:15px;
}

.product {
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.product img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

.price {
    color:#ff3b30;
    font-weight:bold;
}

/* BTN */
.btn {
    background:#111;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

/* CHECKOUT */
.checkout {
    background:white;
    margin:20px;
    padding:20px;
    border-radius:20px;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* PANIER ITEM */
.cart-item {
    display:flex;
    justify-content:space-between;
    padding:5px 0;
    border-bottom:1px dashed #eee;
    font-size:14px;
}

/* URGENCE */
.urgent {
    color:red;
    text-align:center;
    font-weight:bold;
    margin-top:10px;
}

/* ANIMATION */
@keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="promo-bar">
🔥 PROMO : -10% AUJOURD'HUI 🔥
</div>

<header>
<img src="https://i.ibb.co/xxxxx/header.jpg">

<h1 style="color:#27ae60;">WebProfit Store</h1>
<p>Transforme tes visiteurs en clients 🚀</p>

<div class="alert">
⚠️ Offre limitée aujourd’hui
</div>
</header>

<!-- PRODUITS -->
<div class="container">

<div class="product">
<h3>Habit Élégant</h3>
<img src="https://i.ibb.co/xxxxx/habit.jpg">
<p class="price">1 350 F</p>
<button class="btn" onclick="add('Habit Élégant',1350)">Ajouter</button>
</div>

<div class="product">
<h3>Pantalon Stylé</h3>
<img src="https://i.ibb.co/xxxxx/pantalon.jpg">
<p class="price">3 600 F</p>
<button class="btn" onclick="add('Pantalon Stylé',3600)">Ajouter</button>
</div>

<div class="product">
<h3>Sneakers</h3>
<img src="https://i.ibb.co/xxxxx/sneakers.jpg">
<p class="price">3 150 F</p>
<button class="btn" onclick="add('Sneakers',3150)">Ajouter</button>
</div>

<div class="product">
<h3>Chapeau</h3>
<img src="https://i.ibb.co/xxxxx/chapeau.jpg">
<p class="price">900 F</p>
<button class="btn" onclick="add('Chapeau',900)">Ajouter</button>
</div>

</div>

<!-- PANIER -->
<div class="checkout">

<h2>🛒 Panier</h2>

<div id="cart"></div>

<p><b>Total : <span id="total">0</span> FCFA</b></p>

<input id="name" placeholder="Nom">
<input id="loc" placeholder="Lieu">

<button class="btn" onclick="send()">Commander</button>

<p class="urgent">⚠️ Plus que 3 articles disponibles !</p>

</div>

<script>
let total = 0;

function add(name, price){
    let cart = document.getElementById("cart");

    let item = document.createElement("div");
    item.className = "cart-item";
    item.innerHTML = `<span>${name}</span><b>${price}F</b>`;

    cart.appendChild(item);

    total += price;
    document.getElementById("total").innerText = total;
}

function send(){
    let name = document.getElementById("name").value;
    let loc = document.getElementById("loc").value;

    if(name == ""){
        alert("Remplis ton nom");
        return;
    }

    let message = "🛍️ *COMMANDE WEBPROFIT STORE*%0A";
    message += "👤 Nom: " + name + "%0A";
    message += "📍 Lieu: " + loc + "%0A";
    message += "💰 Total: " + total + " FCFA%0A";
    message += "%0A🚀 Je confirme ma commande";

    window.open("https://wa.me/2250719949973?text=" + message);
}
</script>

</body>
</html>
